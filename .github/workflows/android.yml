name: Android Build From Source Only

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Create temporary Flutter project
        run: |
          flutter create temp_app \
            --platforms=android \
            --org com.msstudio \
            --project-name cost_model

      - name: Copy app source into generated project
        run: |
          rsync -av --delete lib/ temp_app/lib/

          if [ -f pubspec.yaml ]; then
            cp pubspec.yaml temp_app/pubspec.yaml
          fi

          if [ -d assets ]; then
            rsync -av assets/ temp_app/assets/
          fi

          if [ -d test ]; then
            rsync -av test/ temp_app/test/
          fi

          if [ -f analysis_options.yaml ]; then
            cp analysis_options.yaml temp_app/analysis_options.yaml
          fi

      - name: Get dependencies
        working-directory: temp_app
        run: flutter pub get

      - name: Analyze project
        working-directory: temp_app
        run: flutter analyze

      - name: Run tests if present
        working-directory: temp_app
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test directory found, skipping tests."
          fi

      - name: Build release APK
        working-directory: temp_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cost-model-apk
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
